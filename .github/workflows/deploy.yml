name: Deploy Slides

on:
  workflow_dispatch:
    inputs:
      deck:
        description: Deck slug to deploy, or all
        required: true
        default: all
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all decks
        if: github.event_name == 'push' || inputs.deck == 'all'
        run: npm run build:all

      - name: Build selected deck
        if: github.event_name == 'workflow_dispatch' && inputs.deck != 'all'
        run: npm run build -- ${{ inputs.deck }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
