<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="70 80 1060 620" role="img" aria-labelledby="title desc">
  <title id="title">CI/CD infinity loop</title>
  <desc id="desc">A clean CI/CD infinity loop with CI, CD, plan, code, build, continuous testing, release, deploy, operate, and operational feedback.</desc>
  <defs>
    <linearGradient id="loopGradient" x1="130" x2="1070" y1="160" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b878ff"/>
      <stop offset="0.23" stop-color="#70a7ff"/>
      <stop offset="0.5" stop-color="#33c7f4"/>
      <stop offset="0.78" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#9af2b6"/>
    </linearGradient>
    <linearGradient id="softSheen" x1="130" x2="1070" y1="160" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="0.42" stop-color="#e0f2fe" stop-opacity="0.28"/>
      <stop offset="0.72" stop-color="#ccfbf1" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="loopShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#000000" flood-opacity="0.48"/>
    </filter>
    <filter id="textLift" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#020617" flood-opacity="0.75"/>
    </filter>
    <path id="loop" d="M166 360 C262 144 486 144 600 360 C714 576 938 576 1034 360 C938 144 714 144 600 360 C486 576 262 576 166 360"/>
  </defs>

  <g filter="url(#loopShadow)">
    <use href="#loop" fill="none" stroke="#020617" stroke-width="132" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#loop" fill="none" stroke="url(#loopGradient)" stroke-width="106" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#loop" fill="none" stroke="url(#softSheen)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M186 351 L244 293 L303 340" fill="none" stroke="#07111f" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>
    <path d="M896 176 L965 252 L895 310" fill="none" stroke="#07111f" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>
    <path d="M922 528 L993 462 L1060 518" fill="none" stroke="#07111f" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>
    <path d="M333 540 L404 594 L470 532" fill="none" stroke="#07111f" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <circle cx="382" cy="360" r="104" fill="#020617" fill-opacity="0.88" stroke="#93c5fd" stroke-opacity="0.34"/>
    <circle cx="818" cy="360" r="104" fill="#020617" fill-opacity="0.88" stroke="#a7f3d0" stroke-opacity="0.3"/>
    <text x="382" y="392" fill="#f8fafc" font-size="92" font-weight="850">CI</text>
    <text x="818" y="392" fill="#f8fafc" font-size="92" font-weight="850">CD</text>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="30" font-weight="850" fill="#f8fafc" text-anchor="middle" filter="url(#textLift)">
    <text x="392" y="196" transform="rotate(18 392 196)">Plan</text>
    <text x="235" y="360" transform="rotate(-35 235 360)">Code</text>
    <text x="360" y="540" transform="rotate(31 360 540)">Build</text>
    <text x="792" y="196" transform="rotate(-18 792 196)">Release</text>
    <text x="960" y="360" transform="rotate(36 960 360)">Deploy</text>
    <text x="832" y="540" transform="rotate(-31 832 540)">Operate</text>
    <text x="676" y="536" transform="rotate(30 676 536)">Build</text>
  </g>

  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <rect x="492" y="304" width="216" height="112" rx="22" fill="#0f172a" fill-opacity="0.94" stroke="#67e8f9" stroke-opacity="0.58"/>
    <text x="600" y="350" fill="#f8fafc" font-size="32" font-weight="900">Test</text>
    <text x="600" y="383" fill="#bfdbfe" font-size="18" font-weight="750">Continuous testing</text>
  </g>

  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <path d="M418 616 C486 650 542 650 600 616 C658 650 714 650 782 616" fill="none" stroke="#4ade80" stroke-width="5" stroke-linecap="round" stroke-dasharray="14 14" opacity="0.86"/>
    <text x="600" y="682" fill="#4ade80" font-size="25" font-weight="900">feedback operativo</text>
  </g>
</svg>
